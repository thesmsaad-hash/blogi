services:
  - type: web
    name: blogi-backend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: blogi-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: APP_KEYS
        generateValue: true
      - key: API_TOKEN_SALT
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: TRANSFER_TOKEN_SALT
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: CLOUDINARY_NAME
        value: obqnl556
      - key: CLOUDINARY_KEY
        value: 242782715613352
      - key: CLOUDINARY_SECRET
        value: AYD3DYLbtug7e6GG-e37p8RJdrs

databases:
  - name: blogi-db
    databaseName: strapi
    user: strapi
